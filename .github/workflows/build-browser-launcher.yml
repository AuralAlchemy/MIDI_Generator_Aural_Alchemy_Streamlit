name: Build Browser Launcher

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build Windows app from spec
        shell: powershell
        run: |
          pyinstaller --noconfirm --clean auralalchemy.spec

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: AuralAlchemy-MIDI-Generator-windows
          path: dist/AuralAlchemy MIDI Generator

  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Patch mac icon in spec
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path("auralchemy.spec")
          s = p.read_text()
          s = s.replace('icon="assets/icon.ico"', 'icon="assets/icon.icns"')
          s = s.replace('console=True', 'console=False')
          p.write_text(s)
          PY

      - name: Build macOS app from spec
        run: |
          pyinstaller --noconfirm --clean auralalchemy.spec

      - name: Zip macOS app
        run: |
          cd dist
          zip -r AuralAlchemy-MIDI-Generator-mac.zip "AuralAlchemy MIDI Generator"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: AuralAlchemy-MIDI-Generator-mac
          path: dist/AuralAlchemy-MIDI-Generator-mac.zip
