name: Build Browser Launcher

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Windows app
        shell: powershell
        run: |
          pyinstaller --noconfirm --clean auralalchemy.spec

      - name: Inject icon with rcedit
        shell: powershell
        run: |
          Invoke-WebRequest -Uri "https://github.com/electron/rcedit/releases/download/v2.0.0/rcedit-x64.exe" -OutFile "rcedit.exe"
          .\rcedit.exe "dist\AuralAlchemy MIDI Generator.exe" --set-icon "assets\icon.ico"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: AuralAlchemy-MIDI-Generator-windows
          path: "dist/AuralAlchemy MIDI Generator.exe"

  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Build macOS app
        run: |
          pyinstaller --noconfirm --clean auralachemy_mac.spec

      - name: Create DMG
        run: |
          create-dmg \
            --volname "AuralAlchemy MIDI Generator" \
            --volicon "assets/icon.icns" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 128 \
            --icon "AuralAlchemy MIDI Generator.app" 175 190 \
            --hide-extension "AuralAlchemy MIDI Generator.app" \
            --app-drop-link 425 190 \
            "dist/AuralAlchemy-MIDI-Generator.dmg" \
            "dist/AuralAlchemy MIDI Generator.app" \
            || true

      - name: Fallback DMG if create-dmg failed
        run: |
          if [ ! -f "dist/AuralAlchemy-MIDI-Generator.dmg" ]; then
            hdiutil create \
              -volname "AuralAlchemy MIDI Generator" \
              -srcfolder "dist/AuralAlchemy MIDI Generator.app" \
              -ov -format UDZO \
              "dist/AuralAlchemy-MIDI-Generator.dmg"
          fi

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: AuralAlchemy-MIDI-Generator-mac
          path: dist/AuralAlchemy-MIDI-Generator.dmg
