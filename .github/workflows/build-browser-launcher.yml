name: Build Browser Launcher

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build Windows app
        shell: powershell
        run: |
          pyinstaller --noconfirm `
            --name "AuralAlchemy MIDI Generator" `
            --icon assets/icon.ico `
            --add-data "app.py;." `
            --add-data ".streamlit;.streamlit" `
            --collect-all streamlit `
            --collect-submodules pretty_midi `
            --collect-submodules mido `
            launcher.py

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: AuralAlchemy-MIDI-Generator-windows
          path: dist/AuralAlchemy MIDI Generator

  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build macOS app
        run: |
          pyinstaller --noconfirm \
            --windowed \
            --name "AuralAlchemy MIDI Generator" \
            --icon assets/icon.icns \
            --add-data "app.py:." \
            --add-data ".streamlit:.streamlit" \
            --collect-all streamlit \
            --collect-submodules pretty_midi \
            --collect-submodules mido \
            launcher.py

      - name: Zip macOS app
        run: |
          cd dist
          zip -r AuralAlchemy-MIDI-Generator-mac.zip "AuralAlchemy MIDI Generator.app"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: AuralAlchemy-MIDI-Generator-mac
          path: dist/AuralAlchemy-MIDI-Generator-mac.zip
